networks:
  aii-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:

services:

  # ── Node Exporter — métriques système réelles ────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: aii-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - aii-network
    command:
      - "--path.rootfs=/host"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro

  # ── Prometheus — scrape & stockage métriques ─────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: aii-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    networks:
      - aii-network
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - node-exporter

  # ── Grafana — dashboards ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: aii-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - aii-network
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=aii2026
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

  # ── App Python Flask ──────────────────────────────────────────────────────
  app-python:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: aii-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    networks:
      - aii-network
    environment:
      - APP_ENV=production
      - APP_VERSION=1.0.0

  # ── Nginx — reverse proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: aii-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - aii-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-python